<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>合约复利推演系统</title>
    <style>
        * { box-sizing: border-box; }
        body {
            background-color: #0b0f19;
            color: #00ffff;
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            margin: 0;
            padding: 12px;
            font-size: 16px;
        }
        .container {
            max-width: 680px;
            margin: 0 auto;
            background: rgba(11, 20, 35, 0.9);
            border: 1px solid #0088ff;
            box-shadow: 0 0 20px rgba(0, 136, 255, 0.3) inset;
            border-radius: 12px;
            padding: 16px;
        }
        h1 {
            text-align: center;
            color: #00ffff;
            text-shadow: 0 0 10px #00ffff;
            letter-spacing: 2px;
            border-bottom: 1px dashed #0088ff;
            padding-bottom: 12px;
            margin: 0 0 16px;
            font-size: 20px;
        }
        .control-panel {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 16px;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        label {
            font-size: 14px;
            color: #88ccff;
            line-height: 1.4;
        }
        input[type="number"], select {
            background: #050a14;
            border: 1px solid #0055aa;
            color: #00ffff;
            padding: 12px 14px;
            border-radius: 8px;
            outline: none;
            font-size: 16px;
            width: 100%;
            -webkit-appearance: none;
            transition: border-color 0.2s;
            min-height: 48px;
        }
        input[type="number"]:focus, select:focus {
            border-color: #00ffff;
            box-shadow: 0 0 0 2px rgba(0, 255, 255, 0.2);
        }
        .radio-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: #050a14;
            padding: 12px;
            border: 1px solid #0055aa;
            border-radius: 8px;
        }
        .radio-item {
            display: flex;
            align-items: center;
            gap: 10px;
            min-height: 36px;
        }
        .radio-item input[type="radio"] {
            width: 20px;
            height: 20px;
            min-height: 20px;
            accent-color: #00ffff;
            cursor: pointer;
            flex-shrink: 0;
        }
        .radio-item label {
            font-size: 15px;
            color: #00ffff;
            cursor: pointer;
            margin: 0;
        }
        .withdraw-row {
            display: flex;
            gap: 10px;
        }
        .withdraw-row select {
            flex: 1.6;
        }
        .withdraw-row input {
            flex: 1;
        }
        button.calc-btn {
            background: linear-gradient(90deg, #0055aa, #0088ff);
            color: #fff;
            border: none;
            padding: 16px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            text-shadow: 0 0 5px rgba(255,255,255,0.5);
            box-shadow: 0 0 15px rgba(0, 136, 255, 0.5);
            width: 100%;
            min-height: 56px;
            transition: all 0.2s;
            letter-spacing: 1px;
        }
        button.calc-btn:active {
            opacity: 0.85;
            transform: scale(0.98);
        }
        .summary {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
            margin-bottom: 16px;
        }
        .summary-card {
            background: rgba(0, 85, 170, 0.2);
            border-left: 3px solid #00ffff;
            border-radius: 6px;
            padding: 10px 10px;
            text-align: center;
        }
        .summary-card .s-label {
            font-size: 12px;
            color: #88ccff;
            margin-bottom: 4px;
        }
        .summary-card .s-value {
            font-size: 16px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 5px #0ff;
            word-break: break-all;
        }

        /* 表格：横向滚动 */
        .table-wrapper {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            border-radius: 8px;
            border: 1px solid rgba(0, 136, 255, 0.3);
        }
        table {
            width: 100%;
            min-width: 460px;
            border-collapse: collapse;
            font-size: 13px;
        }
        th, td {
            border: 1px solid rgba(0, 136, 255, 0.2);
            padding: 10px 8px;
            text-align: center;
            white-space: nowrap;
        }
        th {
            background: rgba(0, 136, 255, 0.2);
            color: #00ffff;
            font-size: 13px;
            position: sticky;
            top: 0;
        }
        tr:nth-child(even) { background: rgba(0, 85, 170, 0.1); }
        tr:hover { background: rgba(0, 255, 255, 0.07); }
        .highlight { color: #ff3366; font-weight: bold; }
        .profit { color: #00ff88; }
        .end-principal { font-weight: bold; color: #fff; }

        @media (min-width: 480px) {
            h1 { font-size: 22px; }
            .summary-card .s-value { font-size: 18px; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🚀 合约复利推演系统</h1>

    <div class="control-panel">

        <div class="input-group">
            <label>初始本金 (U)</label>
            <input type="number" id="principal" value="1000" min="0" step="0.01" inputmode="decimal">
        </div>

        <div class="input-group">
            <label>交易天数（天）</label>
            <input type="number" id="days" value="30" min="1" inputmode="numeric">
        </div>

        <div class="input-group">
            <label>收益设置方式</label>
            <div class="radio-group">
                <div class="radio-item">
                    <input type="radio" name="yieldType" id="yieldAmountMode" value="amount" checked onchange="toggleYieldInput()">
                    <label for="yieldAmountMode">按每日收益金额</label>
                </div>
                <div class="radio-item">
                    <input type="radio" name="yieldType" id="yieldRateMode" value="rate" onchange="toggleYieldInput()">
                    <label for="yieldRateMode">按固定收益率</label>
                </div>
            </div>
        </div>

        <div class="input-group" id="yieldAmountBox">
            <label>第一天实际收益金额（用于自动计算收益率）</label>
            <input type="number" id="yieldAmount" value="30" min="0" step="0.01" inputmode="decimal">
        </div>

        <div class="input-group" id="yieldRateBox" style="display:none;">
            <label>每日收益率（%）</label>
            <input type="number" id="yieldRate" value="3" min="0" step="0.01" inputmode="decimal">
        </div>

        <div class="input-group">
            <label>提取周期（每几天提取一次，填 0 表示不提取）</label>
            <input type="number" id="withdrawCycle" value="10" min="0" inputmode="numeric">
        </div>

        <div class="input-group">
            <label>提取方式与数值</label>
            <div class="withdraw-row">
                <select id="withdrawType">
                    <option value="percent">比例提取 (%)</option>
                    <option value="amount">固定金额 (U)</option>
                </select>
                <input type="number" id="withdrawValue" value="10" min="0" step="0.01" inputmode="decimal">
            </div>
        </div>

        <button class="calc-btn" onclick="calculate()">执行数据演算</button>
    </div>

    <div class="summary" id="summaryBox" style="display:none;">
        <div class="summary-card">
            <div class="s-label">期末总本金</div>
            <div class="s-value" id="finalPrincipal">0</div>
        </div>
        <div class="summary-card">
            <div class="s-label">累计总收益</div>
            <div class="s-value" id="totalProfit">0</div>
        </div>
        <div class="summary-card">
            <div class="s-label">累计总提取</div>
            <div class="s-value" id="totalWithdraw">0</div>
        </div>
    </div>

    <div class="table-wrapper" id="tableWrapper" style="display:none;">
        <table>
            <thead>
                <tr>
                    <th>天</th>
                    <th>本金 (U)</th>
                    <th>收益率</th>
                    <th>当日收益</th>
                    <th>提取</th>
                    <th>期末本金</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
    function toggleYieldInput() {
        const isAmount = document.getElementById('yieldAmountMode').checked;
        document.getElementById('yieldAmountBox').style.display = isAmount ? 'flex' : 'none';
        document.getElementById('yieldRateBox').style.display = isAmount ? 'none' : 'flex';
    }

    function calculate() {
        const initialPrincipal = parseFloat(document.getElementById('principal').value);
        const days = parseInt(document.getElementById('days').value);
        const isAmountMode = document.getElementById('yieldAmountMode').checked;
        const withdrawCycle = parseInt(document.getElementById('withdrawCycle').value);
        const withdrawType = document.getElementById('withdrawType').value;
        const withdrawValue = parseFloat(document.getElementById('withdrawValue').value);

        if (isNaN(initialPrincipal) || initialPrincipal <= 0) {
            alert('请输入有效的初始本金');
            return;
        }

        let dailyRate = 0;
        if (isAmountMode) {
            const yieldAmount = parseFloat(document.getElementById('yieldAmount').value);
            dailyRate = yieldAmount / initialPrincipal;
        } else {
            const yieldRate = parseFloat(document.getElementById('yieldRate').value);
            dailyRate = yieldRate / 100;
        }

        let currentPrincipal = initialPrincipal;
        let totalProfit = 0;
        let totalWithdraw = 0;

        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';

        for (let day = 1; day <= days; day++) {
            let dailyProfit = currentPrincipal * dailyRate;
            totalProfit += dailyProfit;

            let withdrawAmount = 0;
            let isWithdrawDay = false;

            if (withdrawCycle > 0 && day % withdrawCycle === 0) {
                isWithdrawDay = true;
                if (withdrawType === 'percent') {
                    withdrawAmount = currentPrincipal * (withdrawValue / 100);
                } else {
                    withdrawAmount = withdrawValue;
                }
                let maxAvailable = currentPrincipal + dailyProfit;
                if (withdrawAmount > maxAvailable) withdrawAmount = maxAvailable;
                totalWithdraw += withdrawAmount;
            }

            let endPrincipal = currentPrincipal + dailyProfit - withdrawAmount;

            let tr = document.createElement('tr');
            tr.innerHTML = `
                <td>第${day}天</td>
                <td>${currentPrincipal.toFixed(2)}</td>
                <td>${(dailyRate * 100).toFixed(2)}%</td>
                <td class="profit">+${dailyProfit.toFixed(2)}</td>
                <td class="${isWithdrawDay ? 'highlight' : ''}">${isWithdrawDay ? '-' + withdrawAmount.toFixed(2) : '--'}</td>
                <td class="end-principal">${endPrincipal.toFixed(2)}</td>
            `;
            tbody.appendChild(tr);

            currentPrincipal = endPrincipal;
        }

        document.getElementById('finalPrincipal').innerText = currentPrincipal.toFixed(2);
        document.getElementById('totalProfit').innerText = totalProfit.toFixed(2);
        document.getElementById('totalWithdraw').innerText = totalWithdraw.toFixed(2);

        document.getElementById('summaryBox').style.display = 'grid';
        document.getElementById('tableWrapper').style.display = 'block';
    }
</script>
</body>
</html>
